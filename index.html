<!DOCTYPE html>
<!-- MathBoard — Copyright © 2026 Waseem Akhlaque. MIT License (see LICENSE). -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1f2733" />
<title>MathBoard</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./assets/icon.svg" />
<link rel="stylesheet" href="./vendor/uPlot.min.css" />
<link rel="stylesheet" href="./css/app.css?v=15" />
<script src="./vendor/jspdf.umd.min.js" defer></script>
<script src="./vendor/pdf.min.js" defer></script>
<script src="./vendor/math.min.js" defer></script>
<script src="./vendor/simple-statistics.min.js" defer></script>
<script src="./vendor/uPlot.iife.min.js" defer></script>
</head>
<body>

<!-- ===== Library view ===== -->
<section id="library" class="view">
  <header class="lib-head">
    <h1>MathBoard</h1>
    <div class="lib-actions">
      <button id="import-pdf-lib">Import past paper (PDF)</button>
      <button id="new-nb" class="primary">+ New lesson</button>
    </div>
  </header>
  <input id="pdf-file-lib" type="file" accept="application/pdf" hidden />
  <div id="nb-list" class="nb-grid"></div>
  <p class="muted footnote">Paginated notebook whiteboard · works offline · add to Home Screen on iPad</p>
</section>

<!-- ===== Editor view ===== -->
<section id="editor" class="view hidden">
  <div class="toolbar">
    <div class="tbar-row tbar-top">
      <button id="back" class="ghost" title="Back to lessons">‹ Lessons</button>
      <input id="nb-name" class="nb-name" type="text" />
      <div class="tabs">
        <button class="tab-btn active" data-tab="draw">Draw</button>
        <button class="tab-btn" data-tab="maths">Maths</button>
        <button class="tab-btn" data-tab="page">Page</button>
      </div>
      <span class="spacer"></span>
      <button id="undo" title="Undo (⌘Z)">Undo</button>
      <button id="redo" title="Redo (⇧⌘Z)">Redo</button>
      <button id="fit" title="Fit page">Fit</button>
      <button id="graph-toggle" title="Graph functions y = f(x)">f(x)</button>
      <button id="stats-toggle" title="Statistics">Stats</button>
      <button id="calc-toggle" title="Scientific calculator">Calc</button>
      <button id="export-pdf" class="primary">Export PDF</button>
    </div>

    <div class="tbar-row tbar-tools">
      <div class="group" data-tabs="draw maths">
        <button data-tool="select" class="tool" title="Select, move &amp; resize objects (s)">Select</button>
      </div>
      <div class="group" data-tabs="draw">
        <button data-tool="pen" class="tool active" title="Pen (p)">Pen</button>
        <button data-tool="highlighter" class="tool" title="Highlighter (h)">Highlight</button>
        <button data-tool="eraser" class="tool" title="Eraser (e)">Erase</button>
        <button data-tool="lasso" class="tool" title="Lasso select (l)">Lasso</button>
        <button data-tool="text" class="tool" title="Text box (t)">Text</button>
      </div>
      <div class="group" data-tabs="draw">
        <button data-tool="line" class="tool" title="Straight line">Line</button>
        <button data-tool="rect" class="tool" title="Rectangle">Rect</button>
        <button data-tool="ellipse" class="tool" title="Ellipse / oval">Oval</button>
      </div>

      <div class="group" data-tabs="maths">
        <button data-tool="vector" class="tool" title="Vector arrow (v)">Vector</button>
        <button data-tool="plotz" class="tool" title="Plot complex number z = a+bi (z)">Plot z</button>
        <button data-tool="circle" class="tool" title="Circle locus |z − c| = r">Circle</button>
        <button data-tool="line" class="tool" title="Straight line">Line</button>
      </div>
      <div class="group" data-tabs="maths">
        <button id="resultant" title="Show resultant of all vectors on this page">Resultant</button>
        <button id="conjugate" title="Show conjugate of plotted complex numbers">Conjugate</button>
        <label class="ctl-label"><input id="snap" type="checkbox" checked /> Snap</label>
        <label class="ctl-label"><input id="radians" type="checkbox" /> Rad</label>
      </div>

      <div class="group" data-tabs="draw maths" id="swatches"></div>
      <div class="group width-group" data-tabs="draw maths">
        <label>Size</label>
        <input id="width" type="range" min="1" max="24" value="4" />
        <span id="width-val">4</span>
      </div>
      <div class="group" data-tabs="draw">
        <label class="finger"><input id="finger" type="checkbox" /> Finger draws</label>
      </div>

      <div class="group" data-tabs="page">
        <button id="prev" title="Previous page">‹</button>
        <span id="page-label" class="page-label">1 / 1</span>
        <button id="next" title="Next page">›</button>
        <label class="ctl-label" for="paper">Grid</label>
        <select id="paper" title="Grid / paper for this page">
          <option value="plain">None (blank)</option>
          <option value="graph">Graph</option>
          <option value="squared">Squared</option>
          <option value="cornell">Cornell lines</option>
          <option value="argand">Argand plane</option>
          <option value="vectorgrid">Vector grid</option>
          <option value="axes">Coordinate axes</option>
        </select>
        <button id="addpage" title="Add page">+ Page</button>
      </div>
      <div class="group" data-tabs="page">
        <button id="brand-toggle" title="Show/hide branding overlay">Brand</button>
        <button id="insert-pdf">Insert PDF</button>
        <button id="export-png">PNG</button>
      </div>
    </div>
  </div>
  <input id="pdf-file" type="file" accept="application/pdf" hidden />

  <div class="canvas-wrap">
    <canvas id="board"></canvas>
    <div id="brand" class="brand">
      <img class="brand-photo" src="./assets/waseem.jpg" alt="Waseem Akhlaque" />
      <div class="brand-text">
        <div class="brand-name">Waseem Akhlaque</div>
        <div class="brand-title">A Level Mathematics Teacher</div>
        <div class="brand-phone">03212890512</div>
      </div>
    </div>
    <div id="busy" class="busy hidden"><div class="busy-box"><div class="spinner"></div><div class="busy-msg">Working…</div></div></div>
    <textarea id="text-editor" class="text-editor hidden" autocomplete="off" autocapitalize="off" spellcheck="false" rows="1"></textarea>
  </div>

  <div id="stats" class="stats-panel hidden">
    <div class="calc-head" id="stats-head">
      <span class="calc-brand">Statistics</span>
      <button class="calc-x" id="stats-close" title="Close" aria-label="Close statistics">×</button>
    </div>
    <div class="stats-body">
      <div class="stats-modes">
        <button class="sm-btn active" data-smode="one">1-variable</button>
        <button class="sm-btn" data-smode="two">2-variable (x, y)</button>
      </div>
      <label class="ct-lab" id="stats-hint">Enter numbers separated by commas or new lines</label>
      <textarea id="stats-data" class="stats-data" spellcheck="false" placeholder="12, 15, 15, 18, 20, 21, 24"></textarea>
      <button id="stats-run" class="ck-eq2">Analyse</button>
      <div id="stats-summary" class="stats-summary"></div>
      <div id="stats-chart" class="stats-chart"></div>
    </div>
  </div>

  <div id="calc" class="calc hidden">
    <div class="calc-head" id="calc-head">
      <span class="calc-brand">MathBoard&nbsp;<b>fx</b></span>
      <button class="calc-x" id="calc-close" title="Close" aria-label="Close calculator">×</button>
    </div>
    <div class="calc-screen">
      <div class="calc-inds">
        <span id="calc-shift-ind" class="ind ind-shift">SHIFT</span>
        <span id="calc-mode" class="ind">DEG</span>
      </div>
      <input id="calc-expr" class="calc-expr" type="text" placeholder="0" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <div id="calc-result" class="calc-result">0</div>
    </div>
    <div class="calc-keys" id="calc-keys">
      <button data-k="shift" class="ck ck-shift">SHIFT</button>
      <button data-k="table" class="ck ck-ctl">TABLE</button>
      <button data-k="sd" class="ck ck-ctl">S⇔D</button>
      <button data-k="del" class="ck ck-ctl">DEL</button>
      <button data-k="ac" class="ck ck-warn">AC</button>

      <button data-k="sin(" class="ck ck-fn"><span class="sh">sin⁻¹</span>sin</button>
      <button data-k="cos(" class="ck ck-fn"><span class="sh">cos⁻¹</span>cos</button>
      <button data-k="tan(" class="ck ck-fn"><span class="sh">tan⁻¹</span>tan</button>
      <button data-k="log(" class="ck ck-fn"><span class="sh">eˣ</span>ln</button>
      <button data-k="log10(" class="ck ck-fn"><span class="sh">10ˣ</span>log</button>

      <button data-k="^" class="ck ck-fn">xʸ</button>
      <button data-k="sqrt(" class="ck ck-fn">√</button>
      <button data-k="^2" class="ck ck-fn">x²</button>
      <button data-k="(" class="ck ck-fn">(</button>
      <button data-k=")" class="ck ck-fn">)</button>

      <button data-k="pi" class="ck ck-fn">π</button>
      <button data-k="e" class="ck ck-fn">e</button>
      <button data-k="i" class="ck ck-fn">i</button>
      <button data-k="abs(" class="ck ck-fn">|x|</button>
      <button data-k="!" class="ck ck-fn">n!</button>

      <button data-k="7" class="ck">7</button>
      <button data-k="8" class="ck">8</button>
      <button data-k="9" class="ck">9</button>
      <button data-k="/" class="ck ck-op">÷</button>
      <button data-k="combinations(" class="ck ck-fn">nCr</button>

      <button data-k="4" class="ck">4</button>
      <button data-k="5" class="ck">5</button>
      <button data-k="6" class="ck">6</button>
      <button data-k="*" class="ck ck-op">×</button>
      <button data-k="permutations(" class="ck ck-fn">nPr</button>

      <button data-k="1" class="ck">1</button>
      <button data-k="2" class="ck">2</button>
      <button data-k="3" class="ck">3</button>
      <button data-k="-" class="ck ck-op">−</button>
      <button data-k="ans" class="ck ck-fn">Ans</button>

      <button data-k="0" class="ck">0</button>
      <button data-k="." class="ck">.</button>
      <button data-k="," class="ck">,</button>
      <button data-k="+" class="ck ck-op">+</button>
      <button data-k="eq" class="ck ck-eq">=</button>
    </div>

    <div id="calc-table" class="calc-table hidden">
      <label class="ct-lab">f(x) =</label>
      <input id="ct-fx" class="ct-in" type="text" placeholder="x^2 - 3" autocomplete="off" spellcheck="false" />
      <div class="ct-row3">
        <span><label class="ct-lab">Start</label><input id="ct-start" class="ct-in" type="text" value="-3" /></span>
        <span><label class="ct-lab">End</label><input id="ct-end" class="ct-in" type="text" value="3" /></span>
        <span><label class="ct-lab">Step</label><input id="ct-step" class="ct-in" type="text" value="1" /></span>
      </div>
      <div class="ct-btns">
        <button id="ct-back" class="ck ck-fn">‹ Keys</button>
        <button id="ct-gen" class="ck ck-eq2">Generate</button>
      </div>
      <div id="ct-out" class="ct-out"></div>
    </div>
  </div>

  <div id="graph" class="gpanel hidden">
    <div class="gp-head" id="gp-head">
      <span class="calc-title">Graph &nbsp;y = f(x)</span>
      <button class="calc-x" id="graph-close" title="Close" aria-label="Close grapher">×</button>
    </div>
    <div id="gp-list" class="gp-list"></div>
    <div class="gp-actions">
      <button id="gp-add" class="ck ck-fn">+ Add</button>
      <button data-fn="sin(x)" class="gp-quick ck ck-fn">sin</button>
      <button data-fn="cos(x)" class="gp-quick ck ck-fn">cos</button>
      <button data-fn="tan(x)" class="gp-quick ck ck-fn">tan</button>
    </div>
    <div class="gp-hint">x-axis in radians · variable is x · e.g. 2*sin(x)+1, x^2-3, e^x</div>
  </div>
</section>

<script type="module" src="./js/app.js?v=15"></script>
</body>
</html>
